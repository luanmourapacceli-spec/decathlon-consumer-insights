version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: decathlon_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: decathlon_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://decathlon_kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - infra_net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: decathlon_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: decathlon-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: decathlon_kafka:9092
    networks:
      - infra_net

  postgres:
    image: postgres:15
    container_name: decathlon_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: decathlon_insights
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra_net

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: decathlon_mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://postgres:postgres@decathlon_postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - infra_net

  airflow-webserver:
    image: apache/airflow:2.9.0
    container_name: decathlon_airflow_web
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/decathlon_insights
      AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
      AIRFLOW__WEBSERVER__SECRET_KEY: "decathlon_secret_key_2026"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: "google-play-scraper textblob langdetect kafka-python psycopg2-binary pandas apache-airflow-providers-apache-spark==4.1.0"
    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../ml:/opt/airflow/ml
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8090:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - infra_net

  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: decathlon_airflow_scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/decathlon_insights
      AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
      AIRFLOW__WEBSERVER__SECRET_KEY: "decathlon_secret_key_2026"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _PIP_ADDITIONAL_REQUIREMENTS: "google-play-scraper textblob langdetect kafka-python psycopg2-binary pandas apache-airflow-providers-apache-spark==4.1.0"
    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../ml:/opt/airflow/ml
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    networks:
      - infra_net

  spark:
    image: apache/spark:3.5.1
    container_name: decathlon_spark
    user: root
    command:
      ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "8282:8080"
      - "7077:7077"
    volumes:
      - ../spark:/opt/spark-jobs
    networks:
      - infra_net

  spark-worker:
    image: apache/spark:3.5.1
    container_name: decathlon_spark_worker
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://decathlon_spark:7077",
      ]
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    depends_on:
      - spark
    volumes:
      - ../spark:/opt/spark-jobs
    networks:
      - infra_net

volumes:
  postgres_data:
  mlflow_artifacts:

networks:
  infra_net:
    driver: bridge
